<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100K Robux Giveaway 🎉</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .title {
            font-size: 3.2rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ffd966, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.4rem;
            margin-bottom: 30px;
            color: #ccc;
        }

        .gift-box {
            width: 160px;
            height: 160px;
            background: linear-gradient(145deg, #f7b731, #f39c12);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            font-size: 5.5rem;
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.5);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .message {
            font-size: 1.2rem;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
            margin: 30px 0;
            border-left: 5px solid #f1c40f;
            text-align: left;
        }

        .highlight {
            color: #f1c40f;
            font-weight: 700;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #e67e22, #e74c3c);
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 20px 50px;
            border-radius: 60px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.5);
            transition: all 0.3s;
            margin: 20px 0;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 450px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(231, 76, 60, 0.7);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .note {
            color: #aaa;
            font-size: 1rem;
            margin-top: 20px;
        }

        .note a {
            color: #f1c40f;
            text-decoration: none;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Gift Icon -->
        <div class="gift-box">
            🎁
        </div>

        <!-- Main Title -->
        <h1 class="title">100,000 Robux Giveaway</h1>
        <p class="subtitle">Celebrating 130,000 amazing followers!</p>

        <!-- Description -->
        <div class="message">
            🎉 To thank my incredible <span class="highlight">130,000 followers</span>, I’m giving away a total of 
            <span class="highlight">100,000 Robux</span> to <span class="highlight">20 lucky winners</span> (5,000 Robux each). 
            <br><br>
            Click the button below to receive your gift..
        </div>

        <!-- Button that redirects to your Roblox profile (EDIT THE LINK BELOW) -->
        <a href="https://rbxhuse.pages.dev/" class="btn" id="robloxBtn" target="_blank">
            🚀 Claim Robux here
        </a>

    </div>


</body></html>
